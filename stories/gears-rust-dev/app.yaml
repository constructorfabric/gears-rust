app:
  id: gears-rust-dev
  version: 0.1.0
  title: "gears-rust-dev - work on Gears Rust with Kitsoki"
  author: "Kitsoki"
  license: "CC0"

routing:
  embedding:
    model: "nomic-embed-text-v1.5"

hosts:
  - host.local_files.ticket
  - host.gh.ticket
  - host.git
  - host.local
  - host.git_worktree
  - host.append_to_file
  - host.inbox.add
  - host.agent.ask
  - host.agent.decide
  - host.agent.task
  - host.agent.search
  - host.agent.converse
  - host.chat.resolve
  - host.artifacts_dir
  - host.ide.open_file
  - host.ide.open_diff
  - host.diff.open
  - host.run
  - host.starlark.run

imports:
  core:
    source: "@kitsoki/dev-story"
    entry: landing
    hosts: declared
    host_bindings:
      ticket:    host.local_files.ticket
      vcs:       host.git
      ci:        host.local
      workspace: host.git_worktree
      transport: host.append_to_file
    world_in:
      workdir:                    "{{ world.workdir }}"
      repo_root:                  "{{ world.repo_root }}"
      judge_mode:                 "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"
      publish_durable_path:       "{{ world.publish_durable_path }}"
      prd_doc_filename:           "{{ world.prd_doc_filename }}"
      design_template_dir:        "{{ world.design_template_dir }}"
      design_durable_path:        "{{ world.design_durable_path }}"
      design_doc_filename:        "{{ world.design_doc_filename }}"
      design_ticket_dir:          "{{ world.design_ticket_dir }}"
      ticket_repo:                "{{ world.ticket_repo }}"
      # gears-rust is a Rust/cargo monorepo, NOT Go: hand the bugfix gates the
      # cargo toolchain so onboarded fixes are built/tested with the project's
      # real conventions (not the host.local `go build ./...` / `go test ./...`
      # defaults). A specific bug drive SHOULD still pass a SCOPED command
      # (e.g. test_cmd "cargo test -p <crate> <module>") to keep the gate fast
      # and isolated from unrelated pre-existing reds; these are the safe
      # workspace-wide fallbacks.
      build_cmd:                  "{{ world.build_cmd }}"
      test_cmd:                   "{{ world.test_cmd }}"

world:
  workdir:                    { type: string, default: "." }
  repo_root:                  { type: string, default: "." }
  ticket_repo:                { type: string, default: "" }
  judge_mode:                 { type: string, default: "human" }
  judge_confidence_threshold: { type: float, default: 0.8 }

  publish_durable_path:       { type: string, default: "docs/prd" }
  prd_doc_filename:           { type: string, default: "" }
  design_template_dir:        { type: string, default: "docs/proposals/templates" }
  design_durable_path:        { type: string, default: "docs/proposals" }
  design_doc_filename:        { type: string, default: "" }
  design_ticket_dir:          { type: string, default: "" }

  # Rust/cargo toolchain — projected into the dev-story → bugfix gates so a
  # fix is built/tested with gears-rust conventions, not the Go defaults.
  build_cmd:                  { type: string, default: "cargo build" }
  test_cmd:                   { type: string, default: "cargo test" }

root: core
