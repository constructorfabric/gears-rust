        - 'Run: cargo test -p cf-gears-toolkit --lib --features bootstrap -- bootstrap::config::tests::test_gh4115'
        - Observe test_gh4115_dashed_gear_name_env_override_is_silently_ignored passes (priority stays 100, env override ignored)
        - Observe test_gh4115_underscored_gear_name_env_override_works passes (priority becomes 50, override works for underscore-named gear — negative control)
        summary_markdown: '## Bug Verified: gh-4115 — Gear/plugin config unreachable via env-var overrides in Kubernetes


          ### What is broken


          Gears registered with hyphenated names (e.g. `static-authz-plugin`, `static-authn-plugin`, `account-management`, etc.) store their config in `AppConfig.gears` under a `HashMap` key that contains dashes (`"static-authz-plugin"`). The env-var override layer uses figment''s `Env::prefixed("APP__").split("__")`, which lowercases the variable name and replaces every `__` with `.` — but **never translates `_` (underscore) to `-` (dash)**.


          In Kubernetes, env var names must satisfy the C_IDENTIFIER rule (`[A-Za-z_][A-Za-z0-9_]*`). Dashes are illegal. So the only legal form is `APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__PRIORITY=50`, which figment maps to the key path `gears.static_authz_plugin.config.priority`. That key is absent from the `HashMap` (whose entry lives under `"static-authz-plugin"` with dashes). The override is **silently dropped** and the value from the YAML file persists unchanged.


          ### Root cause location


          `libs/toolkit/src/bootstrap/config/mod.rs`, line 325:


          ```rust

          .merge(Env::prefixed("APP__").split("__"));

          ```


          No dash↔underscore normalisation is applied to the segment produced for the gear name.


          ### How it was reproduced


          Two deterministic unit tests were added to the `bootstrap::config::tests` module:


          1. **`test_gh4115_dashed_gear_name_env_override_is_silently_ignored`** — writes a YAML config with `gears: static-authz-plugin: config: priority: 100`, sets `APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__PRIORITY=50` (the only K8s-legal form), calls `AppConfig::load_layered`, and asserts that `priority` is still `100`. The assertion passes — confirming the override was dropped.


          2. **`test_gh4115_underscored_gear_name_env_override_works`** (negative control) — same setup but with the gear named `static_authz_plugin` (underscores). The env var override succeeds and `priority` becomes `50`, proving the figment wiring is correct and the failure is isolated to dashed names.


          Both tests pass:


          ```

          running 2 tests

          test bootstrap::config::tests::test_gh4115_underscored_gear_name_env_override_works ... ok

          test bootstrap::config::tests::test_gh4115_dashed_gear_name_env_override_is_silently_ignored ... ok

          ```


          Run with:

          ```

          cargo test -p cf-gears-toolkit --lib --features bootstrap -- bootstrap::config::tests::test_gh4115

          ```


          ### Scope of impact


          Practically **every gear** in this repo uses a hyphenated name (`static-authz-plugin`, `static-authn-plugin`, `oidc-authn-plugin`, `account-management`, `api-gateway`, `grpc-hub`, `nodes-registry`, `resource-group`, `authn-resolver`, `authz-resolver`, `tenant-resolver`, `gear-orchestrator`, `static-credstore-plugin`, `static-tr-plugin`, `rg-tr-plugin`, `tr-authz-plugin`, `file-parser`, `single-tenant-tr-plugin`, `static-mini-chat-model-policy-plugin`, `static-mini-chat-audit-plugin`). All are blocked from env-var config overrides in Kubernetes deployments.


          ### Expected outcome


          `APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__PRIORITY=50` should override `static-authz-plugin`''s `priority` from 100 to 50.


          ### Actual outcome


          The override is silently ignored; `priority` stays 100 (the YAML value).


          ### Evidence


          Test code written to: `libs/toolkit/src/bootstrap/config/mod.rs` (tests `test_gh4115_dashed_gear_name_env_override_is_silently_ignored` and `test_gh4115_underscored_gear_name_env_override_works`).

          '
        summary_title: 'gh-4115 CONFIRMED: Dashed-gear config not overridable via APP__ env vars in Kubernetes'
