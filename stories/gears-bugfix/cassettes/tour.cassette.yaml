  response:
    data:
      claude_session_id: 34947afe-c2d5-4d4a-807d-510f6cb8c967
      exit_code: 0.0
      ok: true
      rationale: '⁣⁡⁡⁣Submitted. Here''s what the fix proposal captures:


        **Root cause** (`config/mod.rs` line 325): `Env::prefixed("APP__").split("__")` lowercases and splits on `__` but never translates `_` → `-`. For a K8s env var `APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__PRIORITY`, figment writes to `gears["static_authz_plugin"]`, while the YAML populates `gears["static-authz-plugin"]`. Both keys coexist as separate `HashMap` entries; the env override is silently abandoned.


        **Fix** — a post-extraction normalisation pass in `AppConfig::load_layered`, right after `figment.extract()`:

        1. Collect pairs where an underscore-keyed gear entry has a dash-equivalent entry in the same map.

        2. Deep-merge the underscore entry (env overrides) into the dash entry (YAML base), env wins.

        3. Remove the underscore entry so callers continue looking up gears by their canonical dashed name.


        Plus a local `merge_gear_env_override` helper (same recursive pattern as the existing `merge_json_objects` in `oop.rs`) and an update to the existing regression test to assert the corrected behavior (`priority == 50`).


        **Single file changed:** `libs/toolkit/src/bootstrap/config/mod.rs`. No new dependencies. Confidence: 0.90.⁣⁢⁢⁣'
      submitted:
        affected_files:
        - libs/toolkit/src/bootstrap/config/mod.rs
        alternative_approaches:
        - 'Two-phase loading: parse YAML first to collect dashed gear names, then build a custom Env::map() closure that translates the gear-name segment of any APP__GEARS__* key from underscore-form to dash-form before figment processes it. Cleaner at the figment layer but requires an extra YAML parse and complex string manipulation to identify the gear-name segment boundary within the full lowercased key string.'
        - Normalize gear names to underscore form everywhere (rename HashMap keys at YAML load time from dashes to underscores). Eliminates the mismatch entirely but is a larger invasive change touching every call site that looks up gears by name (including downstream gear registration, dump utilities, and external config files).
        confidence: 0.9
        fix_description: "In `AppConfig::load_layered` (libs/toolkit/src/bootstrap/config/mod.rs, ~line 327), add a post-extraction normalisation pass immediately after `figment.extract()` returns `config`:\n\n```rust\n// gh-4115: K8s env var names cannot contain dashes. Operators encode\n// APP__GEARS__STATIC_AUTHZ_PLUGIN__... (underscores) for a gear named\n// \"static-authz-plugin\". Figment maps this to gears[\"static_authz_plugin\"],\n// but the HashMap has the YAML key \"static-authz-plugin\". Find every pair\n// where an underscore-keyed entry and its dash-equivalent both exist, deep-merge\n// the underscore entry (env override) into the dash entry (YAML base), then drop\n// the underscore entry so callers always look up gears by their canonical dashed name.\nlet pairs_to_merge: Vec<(String, String)> = config\n    .gears\n    .keys()\n    .filter(|k| k.contains('_'))\n    .map(|k| (k.clone(), k.replace('_', \"-\")))\n    .filter(|(u, d)| u != d && config.gears.contains_key(d.as_str()))\n    .collect();\nfor (underscore_key, dashed_key) in pairs_to_merge {\n    if let Some(env_val) = config.gears.remove(&underscore_key) {\n        if let Some(base) = config.gears.get_mut(&dashed_key) {\n            merge_gear_env_override(base, env_val);\n        }\n    }\n}\n```\n\nAlso add a private helper function (alongside `merge_gear_files`):\n\n```rust\n/// Deep-merges `env_override` into `base`; `env_override` values win on conflicts.\n/// Used by the gh-4115 fix to apply Kubernetes env-var overrides (underscore-keyed)\n/// into YAML base entries (dash-keyed).\nfn merge_gear_env_override(base: &mut serde_json::Value, env_override: serde_json::Value) {\n    match (base, env_override) {\n        (serde_json::Value::Object(base_obj), serde_json::Value::Object(override_obj)) => {\n            for (key, override_val) in override_obj {\n                match base_obj.entry(key) {\n                    serde_json::map::Entry::Occupied(mut e) => {\n                        merge_gear_env_override(e.get_mut(), override_val);\n                    }\n                    serde_json::map::Entry::Vacant(e) => {\n                        e.insert(override_val);\n                    }\n                }\n            }\n        }\n        (base, override_val) => *base = override_val,\n    }\n}\n```\n\nFinally, update the existing regression test: rename `test_gh4115_dashed_gear_name_env_override_is_silently_ignored` → `test_gh4115_dashed_gear_name_env_override_works` and change the assertion from `assert_eq!(actual_priority, 100, \"gh-4115 CONFIRMED ...\")` to `assert_eq!(actual_priority, 50, \"env override should have applied\")`."
        reasoning: 'The reproduction artifact contains two deterministic unit tests that prove the exact failure mode: the env var creates `gears["static_authz_plugin"]` while the YAML creates `gears["static-authz-plugin"]`; both coexist; the underscore entry is abandoned after extraction, leaving the YAML value unchanged. The fix inserts a single normalisation pass after extraction that collapses these pairs using a recursive deep-merge (env wins), which is the same pattern as `merge_json_objects` already used in `oop.rs`. The test''s own comment already documents the expected post-fix assertion (`assert_eq!(actual_priority, 50)`), confirming the intent. The change is confined to one file, requires no new dependencies, and does not alter public API surface. The only residual risk is the edge case of intentionally distinct gears whose names differ only by dash vs underscore — not present in the repo and contrary to naming conventions.'
        root_cause: The env-var layer uses `Env::prefixed("APP__").split("__")` (mod.rs line 325), which lowercases the var name and replaces every `__` with a key-path separator but performs no dash↔underscore translation. For `APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__PRIORITY`, figment writes to the figment key path `gears.static_authz_plugin.config.priority`. When extracted into `AppConfig`, this populates `gears["static_authz_plugin"]`. Meanwhile, the YAML provider populated `gears["static-authz-plugin"]`. Because `HashMap` keys are compared literally, the two entries coexist as separate gears; the env override is never merged into the YAML base entry, and is then simply ignored when the caller looks up `config.gears.get("static-authz-plugin")`.
        summary_markdown: '## Bug


          Gears with hyphenated names (e.g. `static-authz-plugin`) store their config in `AppConfig.gears` under a `HashMap<String, serde_json::Value>` key that contains dashes. Kubernetes prohibits dashes in env var names (C_IDENTIFIER rule), so operators must encode `APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__PRIORITY=50` (underscores). Figment''s `Env::prefixed("APP__").split("__")` pipeline lowercases and maps `__`→`.`, producing the key path `gears.static_authz_plugin.config.priority` — with underscores. That key is absent from the HashMap (whose entry lives under `"static-authz-plugin"` with dashes). The override is **silently dropped** and the YAML value persists unchanged. Virtually every gear in the repo uses a hyphenated name, so the entire env-var override mechanism is blocked for Kubernetes deployments.


          ## Root Cause


          `libs/toolkit/src/bootstrap/config/mod.rs` line 325:

          ```rust

          .merge(Env::prefixed("APP__").split("__"));

          ```

          No dash↔underscore normalisation is applied. After `figment.extract()`, the env-var layer may populate `gears["static_authz_plugin"]` (underscores) while the YAML layer populated `gears["static-authz-plugin"]` (dashes). The two coexist as separate HashMap entries; the env override never reaches the YAML base.


          ## Fix


          Add a post-extraction normalisation pass in `AppConfig::load_layered` (immediately after `figment.extract()`):


          1. Scan `config.gears` for any key that contains `_` and whose dash-equivalent (replacing all `_` with `-`) also exists in the map.

          2. Deep-merge the underscore-keyed entry (env override) INTO the dash-keyed entry (YAML base), with env values taking precedence.

          3. Remove the underscore-keyed entry so callers continue to look up gears by their canonical dashed name.


          Add a local helper function `merge_gear_env_override(base: &mut serde_json::Value, env_override: serde_json::Value)` — a recursive deep-merge where `env_override` wins on conflicts (same pattern as the existing `merge_json_objects` in `oop.rs`, but takes ownership of the override value for ergonomics).


          Update the existing regression test `test_gh4115_dashed_gear_name_env_override_is_silently_ignored` to assert the now-correct behaviour (`priority == 50`) and rename it to `test_gh4115_dashed_gear_name_env_override_works`.


          ## Files


          - `libs/toolkit/src/bootstrap/config/mod.rs` — add helper + normalisation pass + fix test assertion


          ## Confidence


          0.90 — Cause is unambiguous (confirmed by two deterministic unit tests). The post-extraction merge approach reuses an existing pattern already present in `oop.rs`. Only known edge case: a project that intentionally registers two distinct gears `static-authz-plugin` AND `static_authz_plugin` would have them incorrectly merged; this scenario is not present in the codebase and conflicts with naming conventions.'
        summary_title: 'Fix gh-4115: Normalize underscore→dash for Kubernetes env-var overrides of dashed gear names'
