      final_diff: "diff --git a/libs/toolkit/src/bootstrap/config/mod.rs b/libs/toolkit/src/bootstrap/config/mod.rs\nindex 5f38d923..16e02465 100644\n--- a/libs/toolkit/src/bootstrap/config/mod.rs\n+++ b/libs/toolkit/src/bootstrap/config/mod.rs\n@@ -339,6 +339,28 @@ impl AppConfig {\n             merge_gear_files(&mut config.gears, dir)?;\n         }\n \n+        // gh-4115: K8s env var names cannot contain dashes. Operators encode\n+        // APP__GEARS__STATIC_AUTHZ_PLUGIN__... (underscores) for a gear named\n+        // \"static-authz-plugin\". Figment maps this to gears[\"static_authz_plugin\"],\n+        // but the HashMap has the YAML key \"static-authz-plugin\". Find every pair\n+        // where an underscore-keyed entry and its dash-equivalent both exist, deep-merge\n+        // the underscore entry (env override) into the dash entry (YAML base), then drop\n+        // the underscore entry so callers always look up gears by their canonical dashed name.\n+        let pairs_to_merge: Vec<(String, String)> = config\n+            .gears\n+            .keys()\n+            .filter(|k| k.contains('_'))\n+            .map(|k| (k.clone(), k.replace('_', \"-\")))\n+            .filter(|(u, d)| u != d && config.gears.contains_key(d.as_str()))\n+            .collect();\n+        for (underscore_key, dashed_key) in pairs_to_merge {\n+            if let Some(env_val) = config.gears.remove(&underscore_key) {\n+                if let Some(base) = config.gears.get_mut(&dashed_key) {\n+                    merge_gear_env_override(base, env_val);\n+                }\n+            }\n+        }\n+\n         Ok(config)\n     }\n \n@@ -495,6 +517,27 @@ fn merge_gear_files(\n     Ok(())\n }\n \n+/// Deep-merges `env_override` into `base`; `env_override` values win on conflicts.\n+/// Used by the gh-4115 fix to apply Kubernetes env-var overrides (underscore-keyed)\n+/// into YAML base entries (dash-keyed).\n+fn merge_gear_env_override(base: &mut serde_json::Value, env_override: serde_json::Value) {\n+    match (base, env_override) {\n+        (serde_json::Value::Object(base_obj), serde_json::Value::Object(override_obj)) => {\n+            for (key, override_val) in override_obj {\n+                match base_obj.entry(key) {\n+                    serde_json::map::Entry::Occupied(mut e) => {\n+                        merge_gear_env_override(e.get_mut(), override_val);\n+                    }\n+                    serde_json::map::Entry::Vacant(e) => {\n+                        e.insert(override_val);\n+                    }\n+                }\n+            }\n+        }\n+        (base, override_val) => *base = override_val,\n+    }\n+}\n+\n // ---- New ToolKit DB Handling Functions ----\n \n /// Expands environment variables in a DSN string.\n@@ -3111,6 +3154,110 @@ gears:\n             result.unwrap_err()\n         );\n     }\n+\n+    // ===================== gh-4115: Dashed-gear env-var override bug =====================\n+\n+    /// Reproduces gh-4115:\n+    ///\n+    /// A gear whose name contains dashes (e.g. `static-authz-plugin`) has its config stored in\n+    /// `AppConfig.gears` under the key `\"static-authz-plugin\"`. In Kubernetes, env var names\n+    /// must satisfy the C_IDENTIFIER rule (`[A-Za-z_][A-Za-z0-9_]*`), so dashes are forbidden.\n+    /// Operators are forced to use underscores: `APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__PRIORITY`.\n+    ///\n+    /// The figment `Env::prefixed(\"APP__\").split(\"__\")` pipeline lowercases and replaces `__`\n+    /// with `.`, producing the key path `gears.static_authz_plugin.config.priority`.\n+    /// However the HashMap entry is keyed `\"static-authz-plugin\"` (dashes), so the lookup\n+    /// misses and the env-var override is silently dropped.\n+    ///\n+    /// This test demonstrates the broken state: the env var override is silently ignored.\n+    /// A correct fix would normalise dashes to underscores (or vice-versa) in the env key\n+    /// mapping so that `STATIC_AUTHZ_PLUGIN` resolves to the `static-authz-plugin` gear.\n+    #[test]\n+    fn test_gh4115_dashed_gear_name_env_override_works() {\n+        let tmp = tempdir().unwrap();\n+        let cfg_path = tmp.path().join(\"cfg.yaml\");\n+        // Gear is named with dashes, as it appears in real config files and as registered\n+        // in the gear macro (name = \"static-authz-plugin\").\n+        let yaml = r#\"\n+server:\n+  home_dir: \"~/.test_gh4115\"\n+gears:\n+  static-authz-plugin:\n+    config:\n+      vendor: \"constructorfabric\"\n+      priority: 100\n+\"#;\n+        fs::write(&cfg_path, yaml).unwrap();\n+\n+        // In Kubernetes you CANNOT set APP__GEARS__STATIC-AUTHZ-PLUGIN__CONFIG__PRIORITY\n+        // because dashes are illegal in env var names (C_IDENTIFIER rule).\n+        // The only valid form uses underscores: STATIC_AUTHZ_PLUGIN.\n+        //\n+        // Expected (correct) behaviour: the underscore form should override the dashed gear.\n+        temp_env::with_var(\n+            \"APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__PRIORITY\",\n+            Some(\"50\"),\n+            || {\n+                let config = AppConfig::load_layered(&cfg_path)\n+                    .expect(\"config load should succeed\");\n+\n+                // The dashed key must still be present in the HashMap.\n+                let gear_value = config.gears.get(\"static-authz-plugin\")\n+                    .expect(\"gear 'static-authz-plugin' should be present\");\n+\n+                let actual_priority = gear_value\n+                    .get(\"config\")\n+                    .and_then(|c| c.get(\"priority\"))\n+                    .and_then(|p| p.as_i64())\n+                    .expect(\"priority field should be present\");\n+\n+                assert_eq!(actual_priority, 50, \"env override should have applied\");\n+            },\n+        );\n+    }\n+\n+    /// Negative control: a gear whose name uses underscores (not dashes) CAN be overridden\n+    /// via env vars in Kubern