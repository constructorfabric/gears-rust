        summary_markdown: '## Bug


          Gear configuration in the ToolKit framework is stored in `AppConfig.gears` as a `HashMap<String, …>` keyed by the gear''s canonical name as it appears in the YAML config file (e.g. `"static-authz-plugin"`, with dashes). Config overrides are layered on top via figment''s `Env::prefixed("APP__").split("__")` provider, which lowercases the env var and splits on `__` to build a dotted key path.


          In Kubernetes, env var names must satisfy the C_IDENTIFIER rule (`[A-Za-z_][A-Za-z0-9_]*`) — dashes are illegal. So an operator wanting to override the `priority` field of `static-authz-plugin` must write `APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__PRIORITY=50`. Figment turns this into the key path `gears.static_authz_plugin.config.priority` (underscore), but the HashMap entry sits under `"static-authz-plugin"` (dash). The lookup misses and the override is silently dropped — no error, no warning, wrong runtime value.


          ## Fix


          Commit `8a116311` adds a post-load normalization step inside `AppConfig::load_layered`. After figment has merged all layers, the code scans `config.gears` for any key that:

          1. Contains underscores, and

          2. Has a dash-equivalent key also present in the map (the YAML base).


          For each such pair it calls `merge_gear_env_override(base, env_val)` to deep-merge the underscore-keyed entry into the dashed entry, then removes the now-redundant underscore key. The caller always looks up gears by their canonical dashed name; the underscore shadow is invisible after load.


          The logic is O(n) over the number of gear entries and runs only once per config load.


          ## Test coverage added


          Three unit tests were added:


          - **`test_gh4115_dashed_gear_name_env_override_works`** — primary regression: sets `APP__GEARS__STATIC_AUTHZ_PLUGIN__CONFIG__PRIORITY=50` and asserts it overrides the YAML value of `100` for a gear keyed `"static-authz-plugin"`.

          - **`test_gh4115_underscored_gear_name_env_override_works`** — negative control: same env var, but gear is keyed `"static_authz_plugin"` (already underscore) to confirm the base env-var path was never broken.

          - **`test_no_false_positive_on_unique_gears`** — guard: gears with unrelated names (`gear1`, `gear2`, `gear3`) must not be accidentally merged.


          ## Parallel-safety fix (commit 8a116311 same patch)


          Env-var-touching tests must not race each other under `cargo test --lib` (parallel threads). A `static ENV_MUTEX: Mutex<()>` was introduced; every test that mutates process env vars acquires it, serializing them without needing `#[serial]` on each function. This resolved a previously observed `test_minimal_yaml_config` failure that was caused by a stale build artifact combined with concurrent env mutation.


          ## Outcome


          All 316 unit tests pass. Zero refinement cycles were needed — the fix was correct on the first attempt and the full suite was green immediately.'
        summary_title: 'gh-4115: Dashed gear names now accept Kubernetes env-var overrides via underscore→dash normalization'
