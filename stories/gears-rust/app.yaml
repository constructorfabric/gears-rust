# gears-rust — dev-story targeting an EXTERNAL project.
#
# The worked example of the external-target profile: the same dev-story hub
# that `kitsoki-dev` points at this repo is here pointed at a foreign repo —
# `constructorfabric/gears-rust` — to drive its PRD → Design (gears-sdlc)
# spec chain. It is `kitsoki-dev` with one thing changed: the doc-profile
# world keys (below) retarget where docs land and what shape they take. No
# engine or dev-story room change is needed to retarget — the seam is config.
#
# # What this instance proves (the POC)
#
#   main → `prd` → author a PRD → `prd_published` → `continue` →
#   design pipeline → publish a DESIGN
#
# lands two gears-sdlc-shaped docs in the gears-rust checkout:
#
#   <repo_root>/gears/<gear>/docs/PRD.md      (fixed name, gears-sdlc PRD)
#   <repo_root>/gears/<gear>/docs/DESIGN.md   (fixed name, gears-sdlc DESIGN)
#
# rather than kitsoki's own flat docs/prd/<slug>.md + docs/proposals/<slug>.md.
# The design author reads this repo's own gears-sdlc templates (templates/) and
# NO kitsoki feature ticket is minted (gears-rust tracks work in GitHub issues
# — the gh ticket adapter is a separate, deferred epic slice).
#
# This is the gears team's OWN story, living in THIS (gears) repo under
# `stories/gears-rust/`. It does NOT copy dev-story: it imports the kitsoki base
# via `source: "@kitsoki/dev-story"` (resolved from the kitsoki binary's embedded
# story library — no kitsoki checkout needed) and extends it with the gears
# profile below. dev-story is a dependency; this repo owns and controls the
# instance.
#
# # Quickstart (from the gears repo root, kitsoki binary on PATH)
#
#   $ kitsoki web        # discovers stories/gears-rust/ via the default ./stories walk
#   # Pick "gears-rust"; type `prd` to start the PRD → Design walk. workdir /
#   # repo_root default to `.` (this checkout).
#
# Author for a different gear or a checkout elsewhere via a warp scenario:
#
#   $ kitsoki run stories/gears-rust/app.yaml --warp stories/gears-rust/scenarios/gears-rust.yaml
#
# # Copy this dir for a NEW external target
#
# This instance IS the template for a second target: copy the dir, change the
# host_bindings (if the ticket/vcs/ci providers differ), repoint the
# doc-profile world keys (durable path = <scope>/docs, the fixed filenames,
# template_dir at the target's spec templates), and add that target's own
# templates. No code change. See README.md.

app:
  id: gears-rust
  version: 0.1.0
  title: "gears-rust — drive an external project's PRD → Design (gears-sdlc) with dev-story"
  author: "Kitsoki"
  license: "CC0"

routing:
  embedding:
    model: "nomic-embed-text-v1.5"

# oracle_plugins must be declared at the instance level — they are NOT inherited
# from imported children. Mirrors kitsoki-dev / dev-story.
oracle_plugins:
  oracle.local_llm:
    plugin: builtin.local_llm
    model: qwen2.5-1.5b-instruct
    grammar: true

# Host allow-list — identical to kitsoki-dev (the same dev-story subtree is
# imported, so the same transitive hosts must be declared under
# `hosts: declared`). The iface-backed handlers are rebound below; for the
# PRD → Design walk only the oracle / chat / run / artifacts / ide hosts are
# actually exercised — ticket/vcs/ci/workspace/transport are declared so load
# passes but are not hit by this POC walk.
hosts:
  - host.local_files.ticket
  - host.git
  - host.local
  - host.git_worktree
  - host.append_to_file
  - host.inbox.add
  - host.oracle.ask
  - host.oracle.decide
  - host.oracle.task
  - host.run
  - host.oracle.search
  - host.artifacts_dir
  - host.ide.open_file
  - host.oracle.converse
  - host.chat.resolve
  - host.diff.open

imports:
  core:
    source: "@kitsoki/dev-story"
    entry: main
    hosts: declared

    host_bindings:
      ticket:    host.local_files.ticket
      vcs:       host.git
      ci:        host.local
      workspace: host.git_worktree
      transport: host.append_to_file

    # Project the instance-level profile into the dev-story hub. dev-story in
    # turn projects publish_durable_path + prd_doc_filename down into its `prd`
    # import, so the PRD and the Design both land in the gears-rust tree under
    # their fixed gears-sdlc names. Every key here has a dev-story default that
    # reproduces kitsoki's own behaviour — overriding them is the whole profile.
    world_in:
      workdir:              "{{ world.workdir }}"
      repo_root:            "{{ world.repo_root }}"
      publish_durable_path: "{{ world.publish_durable_path }}"
      prd_doc_filename:     "{{ world.prd_doc_filename }}"
      design_template_dir:  "{{ world.design_template_dir }}"
      design_durable_path:  "{{ world.design_durable_path }}"
      design_doc_filename:  "{{ world.design_doc_filename }}"
      design_ticket_dir:    "{{ world.design_ticket_dir }}"
      judge_mode:                 "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"

# Instance-level world — the gears-rust PROFILE. These are the only values
# that differ from kitsoki-dev; everything else is the shared dev-story hub.
world:
  # ── Target checkout ───────────────────────────────────────────────
  # This instance is the gears team's own, living in the gears repo
  # (`stories/gears-rust/`), so the target checkout is the repo root itself:
  # `.`. Override with an
  # absolute path via a warp scenario (scenarios/gears-rust.yaml) to point at
  # a checkout elsewhere. Both the PRD and the Design publish under
  # <workdir>/<durable>, so this is the root the gears-sdlc docs land in.
  workdir:   { type: string, default: "." }
  repo_root: { type: string, default: "." }

  # ── Doc profile: gears-sdlc shape + per-gear placement ────────────
  # The target gear the PRD/DESIGN are authored for. `notes-service` is a
  # fresh scratch gear (does not exist in the real tree) so the POC never
  # clobbers a real gear's docs. Change this to author for a different gear.
  publish_durable_path: { type: string, default: "gears/notes-service/docs" }  # PRD home (relative to workdir)
  prd_doc_filename:     { type: string, default: "PRD" }                        # → <workdir>/gears/notes-service/docs/PRD.md
  design_durable_path:  { type: string, default: "gears/notes-service/docs" }   # DESIGN home (relative to workdir)
  design_doc_filename:  { type: string, default: "DESIGN" }                     # → <workdir>/gears/notes-service/docs/DESIGN.md
  design_template_dir:  { type: string, default: "stories/gears-rust/templates" } # this repo's own gears-sdlc PRD/DESIGN/ADR/FEATURE templates (repo-relative)
  design_ticket_dir:    { type: string, default: "" }                           # "" ⇒ skip the kitsoki feature ticket (gears-rust uses GitHub issues)

  # ── Judge polymorphism (same as kitsoki-dev) ─────────────────────
  judge_mode:                 { type: string, default: "human" }
  judge_confidence_threshold: { type: float,  default: 0.8 }

# Root: enter the dev-story hub.
root: core
