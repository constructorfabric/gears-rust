# prd_to_design (gears-rust) — the PRD half of the external-target POC.
#
# Proves the doc-profile retarget: the SAME dev-story PRD pipeline that
# kitsoki-dev publishes into docs/prd/<slug>.md here publishes into the
# gears-rust checkout under the FIXED gears-sdlc name —
# gears/notes-service/docs/PRD.md — and the published path flows across the
# prd_published landing room into the design intake as the seed. Only the
# instance world keys differ (app.yaml); no room or engine change.
#
# Mirror of stories/dev-story/flows/prd_to_design.yaml, but driven through
# the `core` import alias (states core.*, intents core__*, nested core__prd__*)
# and asserting the gears-tree publish path. The design half (publishing
# DESIGN.md) is covered by design_publishes_gears_design.yaml — split because
# the prd author and design author both use the un-id'd host.oracle.task
# default, which can only carry one acceptance shape per flow.
#
# Intent-only (no LLM): prd's on_enter oracle calls are served by stubbed
# hosts. judge_mode=human so no judge runs.

test_kind: flow
app: ../app.yaml
initial_state: core.landing
initial_world:
  # A flow starts INSIDE the `core` compound (initial_state: core.landing), so
  # the instance → core world_in projection never runs (it fires on compound
  # ENTRY from the root). So we seed the core__ profile keys directly — the
  # kitsoki-dev flow pattern. These ARE the gears defaults declared in
  # app.yaml; a real `kitsoki run` projects them on entry. The flow then
  # proves the LAYER WE ADDED: dev-story projecting these down into its prd
  # import (turn 1 asserts core__prd__* below), and the publish wiring.
  judge_mode: "human"
  core__workdir:               "."
  core__publish_durable_path:  "gears/notes-service/docs"
  core__prd_doc_filename:      "PRD"

host_handlers:
  host.ide.open_file:
    data: { ok: true, connected: true }
  host.chat.resolve:
    data: { ok: true, chat_id: "chat-1", title: "PRD idea discovery", is_new: true }
  host.oracle.converse:
    data: { ok: true, answer: "A notes service gear for the platform.", chat_id: "chat-1", claude_session_id: "sess-1" }
  host.oracle.search:
    data: { hits: [] }
  host.oracle.decide:
    data:
      ok: true
      submitted:
        questions:
          - { id: "q1", question: "Who is the primary actor?", why: "scopes the persona" }
          - { id: "q2", question: "What is the single most important success metric?", why: "defines done" }
    by_call:
      match_answer:
        data:
          ok: true
          submitted:
            answers_block:       "Q1: platform users\nQ2: notes-saved-per-session\n"
            answered_ids_append: "|1||2|"
            matched_count:       2
  host.artifacts_dir:
    data: { ok: true, path: ".artifacts/prd/notes-service/001-brief.md", message_id: "001-brief#1" }
  host.run:
    by_call:
      mint_workspace:
        data:
          ok: true
          exit_code: 0
          stdout_json: { slug: "notes-service", workspace: ".artifacts/prd/notes-service" }
      # The prd publish: prd_publish.py with prd_doc_filename="PRD" and
      # publish_durable_path="gears/notes-service/docs" resolves the FIXED
      # gears-sdlc path against world.workdir (the checkout). The stub returns
      # what the real script produces (validated for real by the direct
      # script test + a live run; see the dev-story README doc-profile note).
      publish:
        data:
          ok: true
          exit_code: 0
          stdout_json: { prd_file: "gears/notes-service/docs/PRD.md" }
  host.oracle.task:
    data:
      ok: true
      submitted:
        title:               "PRD: Notes Service"
        summary_markdown:    "## PRD: Notes Service\n\nA sufficiently long summary body to satisfy the schema minimum length for the prd_artifact summary_markdown field, covering problem, actors, goals, and metrics for the notes-service gear."
        file_path:           ".artifacts/prd/notes-service/004-prd.md"
        confidence:          0.84
        needs_clarification: false
        follow_up_questions: []

turns:
  # landing → prd discovery. world_in projects workdir / judge_mode (and the doc
  # profile) into the prd child.
  - intent: { name: core__go_prd, slots: {} }
    expect_state: core.prd.idle
    expect_world:
      core__prd__workdir: "."
      # The doc profile threaded instance → core → prd (two import layers).
      core__prd__publish_durable_path: "gears/notes-service/docs"
      core__prd__prd_doc_filename:     "PRD"

  # Walk the prd pipeline (double-prefixed intents).
  - intent: { name: core__prd__discuss, slots: { message: "I want a notes-service gear" } }
    expect_state: core.prd.idle
  - intent: { name: core__prd__start, slots: {} }
    expect_state: core.prd.search
    expect_world:
      core__prd__idea: "A notes service gear for the platform."
  - intent: { name: core__prd__confirm, slots: {} }
    expect_state: core.prd.clarifying
  - intent: { name: core__prd__answer, slots: { text: "platform users, metric is notes-saved-per-session" } }
    expect_state: core.prd.clarifying
  - intent: { name: core__prd__submit_answers, slots: {} }
    expect_state: core.prd.brief
  - intent: { name: core__prd__confirm, slots: {} }
    expect_state: core.prd.references
  - intent: { name: core__prd__confirm, slots: {} }
    expect_state: core.prd.drafting

  # Accept the PRD → prd @exit:done → the prd_published landing room.
  # The PRD landed in the gears-rust tree under the fixed gears-sdlc name.
  - intent: { name: core__prd__accept, slots: {} }
    expect_state: core.prd_published
    expect_world:
      core__prd__prd_file: "gears/notes-service/docs/PRD.md"

  # continue → the design intake, seeded with a pointer to the published PRD
  # IN THE GEARS TREE. This is the PRD → Design baton.
  - intent: { name: core__continue, slots: {} }
    expect_state: core.design
    expect_world:
      core__design_seed_idea: "Author a design from the PRD at gears/notes-service/docs/PRD.md"

expect_no_errors: true
