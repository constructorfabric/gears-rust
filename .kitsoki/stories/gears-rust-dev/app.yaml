app:
  id: gears-rust-dev
  version: 0.1.0
  title: "gears-rust-dev - work on Gears Rust with Kitsoki"
  author: "Kitsoki"
  license: "CC0"

routing:
  embedding:
    model: "nomic-embed-text-v1.5"

hosts:
  - host.local_files.ticket
  - host.gh.ticket
  - host.git
  - host.local
  - host.git_worktree
  - host.append_to_file
  - host.inbox.add
  - host.agent.ask
  - host.agent.decide
  - host.agent.task
  - host.agent.search
  - host.agent.converse
  - host.chat.resolve
  - host.artifacts_dir
  - host.ide.open_file
  - host.ide.open_diff
  - host.diff.open
  - host.run
  - host.starlark.run

imports:
  core:
    source: "@kitsoki/dev-story"
    entry: landing
    hosts: declared
    host_bindings:
      ticket:    host.local_files.ticket
      vcs:       host.git
      ci:        host.local
      workspace: host.git_worktree
      transport: host.append_to_file
    world_in:
      workdir:                    "{{ world.workdir }}"
      repo_root:                  "{{ world.repo_root }}"
      judge_mode:                 "{{ world.judge_mode }}"
      judge_confidence_threshold: "{{ world.judge_confidence_threshold }}"
      publish_durable_path:       "{{ world.publish_durable_path }}"
      prd_doc_filename:           "{{ world.prd_doc_filename }}"
      design_template_dir:        "{{ world.design_template_dir }}"
      design_durable_path:        "{{ world.design_durable_path }}"
      design_doc_filename:        "{{ world.design_doc_filename }}"
      design_ticket_dir:          "{{ world.design_ticket_dir }}"
      ticket_repo:                "{{ world.ticket_repo }}"
      # Project toolchain commands. Empty means dev-story/bugfix keeps its
      # default gates; non-Go projects should set these from their profile.
      build_cmd:                  "{{ world.build_cmd }}"
      test_cmd:                   "{{ world.test_cmd }}"

world:
  workdir:                    { type: string, default: "." }
  repo_root:                  { type: string, default: "." }
  ticket_repo:                { type: string, default: "" }
  judge_mode:                 { type: string, default: "human" }
  judge_confidence_threshold: { type: float, default: 0.8 }

  # gears-rust's extension of the general dev-story profile: PRD/DESIGN docs
  # land in the target gear docs folder and use the repo's gears-sdlc templates.
  publish_durable_path:       { type: string, default: "gears/notes-service/docs" }
  prd_doc_filename:           { type: string, default: "PRD" }
  design_template_dir:        { type: string, default: "docs/spec-templates/gears-sdlc" }
  design_durable_path:        { type: string, default: "gears/notes-service/docs" }
  design_doc_filename:        { type: string, default: "DESIGN" }
  design_ticket_dir:          { type: string, default: "" }
  build_cmd:                  { type: string, default: "make build" }
  test_cmd:                   { type: string, default: "make test" }

root: core
