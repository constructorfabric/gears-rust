[kits.sdlc.source_provenance]
source_type = "github"
resolver_mode = "latest_release"
resolution_basis = "github_release"
requested_ref = "latest"
resolved_ref = "v1.1.1"
canonical_source = "github:constructorfabric/studio-kit-sdlc"
effective_source = "github:constructorfabric/studio-kit-sdlc"
verified = "verified"
freshness = "fresh"

[kits.sdlc.content_identity]
commit_sha = "eec9788"
resolved_ref = "v1.1.1"
identity = "constructorfabric/studio-kit-sdlc@v1.1.1#eec9788"

[kits.sdlc.local_metadata]
conf_version = "1.0.0"

[install]
version_source = "project_config"
runtime_tracking = "ignored"
agent_tracking = "ignored"
kit_tracking = "tracked"
