# Chat Engine wired to the SAME authn/authz resolver plugins as resource-group.
#
# chat-engine is a toolkit gear: it resolves `dyn AuthZResolverClient` from the
# ClientHub (deps = ["authz-resolver"]) exactly like resource-group. The concrete
# PDP/authn plugin is chosen at the host by cargo features + this config; the
# `authn-resolver` / `authz-resolver` system gears populate the ClientHub.
#
# Build & run:
#   cargo run -p cf-gears-example-server \
#     --features chat-engine,static-authn,static-authz,static-tenants \
#     -- --config config/chat-engine-authz.yaml run
#
# Then call the API with the dev token below:
#   curl -H 'Authorization: Bearer dev-token' http://127.0.0.1:8087/chat-engine/v1/sessions

server:
  home_dir: "~/.cf-gears"

database:
  servers:
    sqlite_dev:
      engine: "sqlite"
      params:
        WAL: "true"
        synchronous: "NORMAL"
        busy_timeout: "5000"
      pool:
        max_conns: 5
        acquire_timeout: "30s"

logging:
  default:
    console_level: info
    file: "logs/chat-engine-authz.log"
    file_level: debug

gears:
  api-gateway:
    config:
      bind_addr: "127.0.0.1:8087"
      enable_docs: true
      cors_enabled: false
      openapi:
        title: "CF/Gears Server API - Chat Engine + AuthZ"
        version: "0.1.0"
      defaults:
        body_limit_bytes: 64000000
        rate_limit:
          rps: 1000
          burst: 200
          in_flight: 64
      # Enable authentication so the PDP receives a real SecurityContext.
      auth_disabled: false
      require_auth_by_default: true

  # ── AuthN pipeline (same plugin family as resource-group) ─────────────────
  authn-resolver:
    config:
      vendor: "constructorfabric"

  static-authn-plugin:
    config:
      vendor: "constructorfabric"
      priority: 100
      mode: static_tokens
      tokens:
        # Full-access dev token. subject_tenant_id matches the static tenant
        # root below so PDP tenant-hierarchy checks resolve. subject_id is the
        # owner stamped on sessions/messages/reactions created with this token.
        - token: "dev-token"
          identity:
            subject_id: "11111111-1111-1111-1111-111111111111"
            subject_tenant_id: "00000000-df51-5b42-9538-d2b56b7ee953"
            token_scopes: ["*"]

  # ── AuthZ pipeline (same plugin family as resource-group) ─────────────────
  authz-resolver:
    config:
      vendor: "constructorfabric"

  static-authz-plugin:
    config:
      vendor: "constructorfabric"
      priority: 100

  # ── Tenant resolver (static root tenant matching the dev token) ───────────
  tenant-resolver:
    config:
      vendor: "constructorfabric"

  static-tr-plugin:
    config:
      vendor: "constructorfabric"
      priority: 20
      tenants:
        - id: "00000000-df51-5b42-9538-d2b56b7ee953"
          name: "dev-root"
          parent_id: null
          status: active

  types-registry:
    config: {}

  # Always-linked support gears (present in cf-gears-example-server by default).
  file-parser:
    config:
      allowed_local_base_dir: /tmp/hyperspot-files

  simple-user-settings:
    database:
      server: "sqlite_dev"
      file: "settings_chat_engine.db"
    config: {}

  # ── Chat Engine (deps = ["authz-resolver"]) ───────────────────────────────
  chat-engine:
    database:
      server: "sqlite_dev"
      file: "chat_engine.db"

tracing:
  enabled: false
