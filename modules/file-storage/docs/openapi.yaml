# Created: 2026-04-20 by Constructor Tech

openapi: 3.1.0
info:
  title: File Storage API
  version: 5.0.0-p1
  description: |
    File Storage REST API — P1 surface. Mirrors the
    `FileStorageClient` SDK trait 1:1 (see
    [rust-traits.md](./rust-traits.md)).

    ## Lifecycle

    Upload is **always multipart** — even single-byte files go
    through the multipart lifecycle as a one-part session. There is
    no single-shot `PutObject` upload path and no separate
    `reconcile` primitive: every DB↔S3 mutation uses multi-phase
    commits, and rows stuck in transient states are recovered
    in-band by the SDK on the next call against them.

    1. The application's own backend posts an upload item to
       `POST /presign-batch` (`capability: "upload.multipart_v1"`,
       optional `file_id` for re-upload, `part_count` ≥ 1) and gets
       back `(file_id, upload_id, part_urls[], expires_at)`. The
       FileStorage row is created (or reused for re-upload) in
       `pending_upload` status; the server has already executed
       `CreateMultipartUpload` against the backend.
    2. The end-client uploads each part directly to its
       corresponding URL (SigV4 PUT against the S3-compatible
       backend) and collects the `(part_number, etag)` pairs from
       the per-part responses.
    3. The application's backend commits the upload via
       `POST /files/{file_id}/upload/{upload_id}`
       (body: `{ parts: [{part_number, etag}] }`). The handler runs
       a 3-phase commit: `PendingUpload → Completing` (Phase 1) →
       `CompleteMultipartUpload` on the backend, captures the
       finalized etag and `version_id` (Phase 2) → `Completing →
       Uploaded` with the new `(etag, version_id)` (Phase 3). The
       response is the post-commit `FileInfo`.

    Re-uploading the same file uses the same `POST /presign-batch`
    endpoint with `capability: "upload.multipart_v1"` and `file_id`
    set. The request item MUST NOT carry `meta` — the server pins
    the row's current metadata into the part URLs.

    Reads:
    - `GET /files/{file_id}` — authoritative metadata (no bytes).
    - `POST /presign-batch` (download item) — batch of presigned
      download URLs. All byte downloads flow client ↔ storage
      backend directly via presigned URLs (or, for files in
      `download_public.v1`-capable backends, bare HTTPS URLs);
      FileStorage never proxies content over its REST surface.

    Mutations:
    - `PUT /files/{file_id}` — atomic DB + S3 metadata sync via a
      2-phase commit (`Uploaded → MetaUpdating → Uploaded`,
      `CopyObject` self-copy with `MetadataDirective: REPLACE`).
      Body declares `name`, `mime_type`, `custom_metadata` only —
      `gts_file_type` is structurally immutable. `If-Match` is
      optional; when supplied it becomes a strong CAS over both DB
      and S3 (HEAD-then-CopyObject with `x-amz-copy-source-if-match`).
    - `DELETE /files/{file_id}` — 2-phase hard delete with a
      transient `deleting` status. `If-Match` is optional.
    - `DELETE /files/{file_id}/upload/{upload_id}` — abort one
      multipart session. Does NOT remove the file row (multiple
      sessions may run in parallel against the same `file_id`); to
      drop the file entirely, follow up with `DELETE /files/{file_id}`.

    ## Addressing

    External addresses are opaque `file_id` (UUID) — see ADR-0002.
    `tenant_id` is read from the caller's bearer token
    (`SecurityContext`) and never appears in the URL. A `file_id`
    from another tenant returns `404 not_found` so the API does not
    act as an enumeration oracle. Backends are addressed by
    `backend_id` (UUID), assigned once in the static TOML roster.

    ## Authentication

    `bearerAuth` everywhere. FileStorage never parses tokens —
    identity arrives via ModKit middleware as `SecurityContext`.
    Presigned PUT / GET URLs are signed by the backend (S3 SigV4)
    and validated by the backend; FileStorage does not authenticate
    the byte transfers themselves. Public-read URLs (issued under
    the `download_public.v1` capability tag for backends that
    declare it, typically paired with `default_public = true`) are
    bare HTTPS URLs with no signing or expiry.

    ## Conditional requests

    - `PUT /files/{file_id}` — `If-Match` is **optional**; when
      supplied it becomes a strong CAS over both DB and S3 (Phase 1
      conditional UPDATE + Phase 2 HEAD with strong CAS).
    - `DELETE /files/{file_id}` — `If-Match` is **optional**; when
      supplied it gates Phase 1 of the 2-phase delete.
    - `GET /files/{file_id}` — `If-None-Match` is supported and
      yields `304 Not Modified` when the etag matches.
    - `POST /files/{file_id}/upload/{upload_id}` — does NOT
      take `If-Match`; the row's transient `Completing` state plus
      Phase 1's conditional UPDATE on
      `(etag, updated_at, version_id[, xmin])` already guard against
      concurrent finalize. `version_id` participates always —
      null-safe via `IS NOT DISTINCT FROM`; `xmin` adds Postgres-only
      transaction-id race detection.

    Mismatch on a supplied `If-Match` returns `412 etag_mismatch`.

    ## User-metadata budget

    AWS S3 caps aggregate user-metadata at 2 KB (Content-Type +
    Content-Disposition + every `x-amz-meta-<k>=<v>`). FileStorage
    enforces the same cap at presign and at `PUT /files/{file_id}`;
    oversize requests return `413 payload_too_large` with the
    `max_metadata_bytes` extension. `gts_file_type` does NOT count
    toward the budget — it is DB-only.

    ## Errors

    RFC 7807 `application/problem+json` via the `ProblemDetails`
    schema, with extensions `code`, `correlation_id`, and
    (for `payload_too_large`) `max_metadata_bytes`.

servers:
  - url: /api/file-storage/v1

security:
  - bearerAuth: []

tags:
  - name: Backends
    description: Backend roster.
  - name: Files
    description: File metadata read / update / delete and listing.
  - name: Presign
    description: Batch presigned URL issuance (upload + download).
  - name: Upload
    description: |
      Multipart upload session lifecycle —
      `POST /files/{file_id}/upload/{upload_id}` (commit) and
      `DELETE /files/{file_id}/upload/{upload_id}` (abort one
      session).

paths:

  /storages:
    get:
      operationId: listBackends
      tags: [Backends]
      summary: List backends visible to the caller's tenant
      description: |
        Returns the roster filtered by the caller's tenant access
        list. At least one backend per tenant view is flagged
        `default_private = true`. Backends declaring the
        `download_public.v1` capability tag and `default_public =
        true` are surfaced too.
      responses:
        '200':
          description: Backend roster.
          headers:
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Backend' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /files:
    get:
      operationId: listFiles
      tags: [Files]
      summary: Paginated owner-scoped file listing
      description: |
        Returns files visible to the caller in the current tenant.
        Authorization on the `owner_id` filter is applied by the
        AuthZ layer — callers without the right scope see only their
        own files even if they request a wider filter.

        Sort order is fixed to `created_at DESC, id ASC`. Other
        filters (`mime_type`, `gts_file_type`, date range,
        `backend_id`) are deferred to P2.
      parameters:
        - in: query
          name: owner_id
          required: false
          description: |
            Filter by owner principal UUID. When omitted the server
            returns the caller's own files (the default safe scope).
          schema: { type: string, format: uuid }
        - in: query
          name: cursor
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: Paginated file list.
          headers:
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileList' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /files/{file_id}:
    parameters:
      - $ref: '#/components/parameters/FileId'
    get:
      operationId: getFile
      tags: [Files]
      summary: Get authoritative file metadata
      description: |
        Returns the FileStorage SQL row as the authoritative
        metadata view. The storage backend is **not** consulted —
        per ADR-0001 the SQL row is the source of truth for reads.

        Optional `If-None-Match` allows the caller to skip the body
        when the row's etag has not changed.
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: File metadata.
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileInfo' }
        '304':
          description: Not Modified.
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

    put:
      operationId: updateFile
      tags: [Files]
      summary: Atomic DB + S3 metadata sync via 2-phase commit
      description: |
        Replaces the mutable subset of `FileMeta`: `name`,
        `mime_type`, `custom_metadata`. Omitted fields keep their
        current value; fields present overwrite them. There is no
        separate PATCH endpoint.

        **Body must NOT include `gts_file_type`** — it is
        structurally immutable (the field is not declared on
        `FileMetaUpdate`). Any request that carries that field is
        rejected with `400 bad_request`. System-managed fields
        (`size_bytes`, `etag`, `version_id`, timestamps, owner,
        `backend_id`) are likewise immutable and not exposed here.

        **`file_id` and `file_path` are permanently immutable.**
        FileStorage does NOT support renaming files: there is no
        REST or SDK path that mutates `file_id` (the opaque UUID
        handle) or `file_path` (the logical path inside the
        backend's tenant scope, also referred to as "file key" in
        S3 terms). Both are captured at the moment of
        `create_presigned_upload` and remain fixed for the file's
        lifetime. To change the logical address, callers must
        upload a new file at the desired `file_path` and delete the
        old one — there is no atomic "move" or "rename" surface.
        `meta.name` (display name, used for `Content-Disposition`)
        IS mutable through this endpoint — it is a display label,
        not an identifier.

        **Multi-phase commit (DB + S3 atomic sync).**

        1. **Phase 1.** Conditional UPDATE flips the row's STATUS
           from `Uploaded` to the transient `MetaUpdating` state,
           capturing `(etag, updated_at, version_id[, xmin])` for
           race detection. `version_id` participates always —
           null-safe via `IS NOT DISTINCT FROM`; `xmin` adds
           Postgres-only transaction-id race detection. The
           `name` / `mime_type` / `custom_metadata` columns still
           hold the OLD values — Phase 1 does NOT write the new
           metadata into the row. `0` rows after 3 retries →
           `409 conflict`.
        2. **Phase 2.** The server merges the update against the
           row's current metadata, validates the backend's
           `max_metadata_bytes` budget (default 2 KiB, error:
           `413 payload_too_large`), then issues a `CopyObject`
           self-copy on the file's backend object with
           `MetadataDirective: REPLACE` and the new headers
           (`Content-Type` from `mime_type`, `Content-Disposition`
           from `name`, `x-amz-meta-<k>` for every entry in
           `custom_metadata`). The backend's response carries the
           new ETag and (versioning-on backends only) the new
           VersionId.
        3. **Phase 3.** Conditional UPDATE flips `MetaUpdating →
           Uploaded` AND writes the new
           `(name, mime_type, custom_metadata, etag, version_id)`
           in one statement — the metadata columns and the status
           transition land atomically. The row never holds new
           metadata under a "still updating" status.

        A row stuck in `MetaUpdating` (handler crash between Phase
        2 and Phase 3) is recovered in-band by the next SDK call:
        HEAD the backend, pull whatever metadata `CopyObject`
        already wrote (which is the truth, even if Phase 3 never
        landed), and run Phase 3 with that. The DB always
        converges to the backend's truth.

        Status transitions related to upload finalization are NOT
        driven through this endpoint — `PendingUpload → Uploaded`
        is the responsibility of
        `POST /files/{file_id}/upload/{upload_id}`.

        **`If-Match` is OPTIONAL.** When supplied it becomes a
        strong CAS over both stores: Phase 1's UPDATE includes
        `etag = If-Match`, Phase 2 HEADs S3 to verify the live
        `s3_etag` (and, on versioning-on backends, `s3_version_id`)
        match the row, then issues `CopyObject` with
        `x-amz-copy-source-if-match` set. Mismatch at any of the
        three checkpoints returns `412 etag_mismatch`. When omitted
        the call is best-effort last-write-wins on metadata
        (`cpt-cf-file-storage-constraint-no-meta-cas`).
      parameters:
        - $ref: '#/components/parameters/IfMatchOptional'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FileMetaUpdate' }
      responses:
        '200':
          description: Update applied.
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileInfo' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            The row is in a transient state that blocks metadata
            updates. The `code` is `delete_in_progress` (`Deleting`),
            or `conflict` (`Completing`, `MetaUpdating`, or 3-retry
            exhaustion under contention).
          headers:
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '412': { $ref: '#/components/responses/EtagMismatch' }
        '413':
          description: |
            Aggregate user-metadata exceeds the backend's
            `max_metadata_bytes` (default 2 KiB). The `code` is
            `payload_too_large`; the response body extension
            `max_metadata_bytes` reports the effective cap.
          headers:
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '502':
          description: |
            Backend `CopyObject` failed (network, 5xx, or other).
            The `code` is `backend_failure`. The row stays in
            `MetaUpdating` and is recovered by the next SDK call.
          headers:
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '500': { $ref: '#/components/responses/InternalError' }

    delete:
      operationId: deleteFile
      tags: [Files]
      summary: 2-phase hard-delete a file
      description: |
        Removes the metadata row and the backend object in a
        2-phase flow:

        1. **Phase 1 — claim the row.** Conditional UPDATE flips
           `status` from `uploaded` to the transient `deleting`.
           When `If-Match` is supplied, the predicate also requires
           `etag = <If-Match>`; mismatch returns `412 etag_mismatch`.
           Without `If-Match` the delete is best-effort
           last-write-wins (still gated by `status = 'uploaded'`).
           A row already in `deleting` returns
           `409 delete_in_progress`.
        2. **Phase 2 — backend cleanup.** FileStorage issues
           `DELETE` on the backend object (idempotent on S3) with
           up to 3 inline retries on transient failure. On
           persistent failure: leave the row in `deleting`, return
           `502 backend_failure`. Subsequent reads return
           `404 not_found`; the P2 GC sweep retries.
        3. **Phase 3 — purge the row.** `DELETE FROM files WHERE id
           = $file_id AND status = 'deleting'` (no etag check —
           the Phase 1 UPDATE owns the row).

        `If-Match: "<etag>"` is **optional**.
      parameters:
        - $ref: '#/components/parameters/IfMatchOptional'
      responses:
        '204':
          description: File deleted.
          headers:
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            The row is already in the transient `deleting` status —
            another delete is in progress. The `code` is
            `delete_in_progress`.
          headers:
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '412': { $ref: '#/components/responses/EtagMismatch' }
        '502':
          description: |
            Phase 2 backend DELETE failed after retries; row left
            in `deleting`. The `code` is `backend_failure`.
          headers:
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '500': { $ref: '#/components/responses/InternalError' }

  /presign-batch:
    post:
      operationId: presignBatch
      tags: [Presign]
      summary: Batch-issue presigned upload and/or download URLs
      description: |
        Single batch entry-point for both upload and download
        presigning. Each item carries a `kind` discriminator and a
        versioned `capability` tag:

        - `kind: "upload"`, no `file_id` — **initial upload.**
          `capability` MUST be `"upload.multipart_v1"`. The handler
          INSERTs a `pending_upload` row, calls
          `CreateMultipartUpload` against the backend, presigns N
          `UploadPart` PUT URLs (one per part — caller-supplied
          `part_count`, 1..=10000), and returns
          `PresignedUploadHandle { file_id, upload_id, part_urls,
          expires_at }`. Each part URL pins, via SigV4
          SignedHeaders, `Content-Type` (from `meta.mime_type`),
          `Content-Disposition` (from `meta.name`), and every
          `x-amz-meta-<k>` (from `meta.custom_metadata`).
          `gts_file_type` is NOT pinned to the backend object.
        - `kind: "upload"`, with `file_id` — **re-upload (overwrite
          in place).** Same `capability`, same response shape. The
          item MUST NOT carry `meta` (rejected with `400
          bad_request`); the server pins the row's CURRENT
          metadata into the part URLs. The row's
          `upload_expires_at` is updated to `MAX(current, NOW +
          TTL)` so multiple outstanding sessions do not shorten the
          window.
        - `kind: "download"` — issues a presigned GET URL (when
          `capability = "download_private.sigv4_v1"`) or a bare-HTTPS
          URL (when `capability = "download_public.v1"` and the
          target backend declares that tag, typically paired with
          `default_public = true`). The signed URL always carries
          `response-content-type` and `response-content-disposition`
          query params from the DB row's metadata. Per-item
          authorization, NotFound, and EtagMismatch errors surface
          inside the response array. Optional `version_id` requests
          a historical generation when the file's hosting backend
          has `versioning = true`.

        Single-shot upload (single PUT) is **not** offered — every
        upload goes through the multipart lifecycle, so even a
        single-byte file is uploaded as a one-part session.
        Subsequent commit/abort happens via the dedicated REST
        endpoints `POST /files/{file_id}/upload/{upload_id}`
        and `DELETE /files/{file_id}/upload/{upload_id}`.

        Mixed batches (uploads + downloads) are allowed. The outer
        `200` only fails for whole-batch transport errors.

        Single-URL callers send a one-element array.

        Aggregate user-metadata across `Content-Type`,
        `Content-Disposition`, and every `x-amz-meta-<k>=<v>` is
        capped by the backend's `max_metadata_bytes` (default
        2 KiB); oversize upload items return per-item
        `payload_too_large` with `max_metadata_bytes`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PresignBatchRequest' }
      responses:
        '200':
          description: Per-item outcomes.
          headers:
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresignBatchResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ── Upload completion / abort endpoints ──────────────────────
  # Both endpoints consume the `upload_id` returned by
  # `POST /presign-batch` (in `PresignedUploadHandle.upload_id`) —
  # FileStorage does not persist `upload_id`, the caller passes
  # it back here.
  /files/{file_id}/upload/{upload_id}:
    parameters:
      - $ref: '#/components/parameters/FileId'
      - name: upload_id
        in: path
        required: true
        schema: { type: string }
        description: |
          URL-encoded backend `UploadId` from
          `PresignedUploadHandle.upload_id`. The path identifies
          one multipart upload session; `POST` finalizes it,
          `DELETE` aborts it.
    post:
      operationId: completeUpload
      tags: [Upload]
      summary: Commit an upload (multi-phase commit)
      description: |
        Multi-phase commit that flips `PendingUpload → Completing
        → Uploaded` (initial upload) or `Uploaded → Completing →
        Uploaded` (re-upload) atomically with the
        `CompleteMultipartUpload` call against the backend.

        **Phases.**

        1. Conditional UPDATE flips the row to the transient
           `Completing` state, capturing the pre-existing
           `(etag, updated_at, version_id[, xmin])` for race
           detection. `version_id` participates always — null-safe
           via `IS NOT DISTINCT FROM`; `xmin` adds Postgres-only
           transaction-id race detection.
        2. `CompleteMultipartUpload` is invoked on the backend with
           the supplied `(part_number, etag)` pairs; the response
           carries the finalized object's etag and `version_id`.
        3. Conditional UPDATE flips `Completing → Uploaded` and
           writes the new `(etag, version_id, size_bytes)` along
           with `upload_expires_at = NULL`.

        **Recovery from a stuck `Completing` row.** If a previous
        `POST` call crashed between Phase 2 and Phase 3, the row
        sits in `Completing`. The next call against the same
        `(file_id, upload_id)` HEADs the backend; if the object
        already finalized, the SDK pulls the etag and runs Phase 3
        alone. Recovery happens only on the SDK / REST handler
        path; direct-to-S3 reads via presigned URLs do not trigger
        recovery.

        Idempotency: a row already in `Uploaded` (someone else
        completed the same `(file_id, upload_id)`) returns
        `409 conflict`. A row in `Deleting` returns
        `409 delete_in_progress`. A missing row returns
        `404 not_found`.

        The `upload_id` path parameter MUST be URL-encoded — S3
        `UploadId` values may contain base64 special characters
        (`+`, `/`, `=`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UploadCompleteRequest' }
      responses:
        '200':
          description: Upload committed.
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
            X-Request-Id: { $ref: '#/components/headers/RequestId' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileInfo' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/BackendFailure' }
    delete:
      operationId: abortUpload
      tags: [Upload]
      summary: Abort one multipart upload session
      description: |
        Calls `AbortMultipartUpload` on the backend for the
        specified `upload_id` only. **Does NOT delete the file
        row.** Multiple upload sessions may run in parallel against
        the same `file_id` (e.g. retry on a stalled session,
        concurrent client attempts), and aborting one session must
        not affect the others — the row remains until either:

        - the caller explicitly removes it by calling
          `DELETE /files/{file_id}` (the canonical "remove this
          file" surface — clients that want to drop the file
          entirely after aborting MUST call it as a second step);
        - or `upload_expires_at` elapses and the GC sweep removes
          it.

        Best-effort: if the `AbortMultipartUpload` call fails on
        the backend, the row stays untouched and the bucket-level
        `AbortIncompleteMultipartUpload` lifecycle rule eventually
        reaps the orphan multipart session.

        **`Completing → PendingUpload` rollback.** When `abort`
        runs against a row that the caller previously flipped to
        `Completing` via `complete` (and that call failed before
        reaching Phase 3), this aborts the pending finalize and
        rolls the row back to `PendingUpload`. A row already in
        `Uploaded` returns `409 conflict` — abort is not a "delete
        already-committed file" surface; use `DELETE /files/{file_id}`
        for that.

        The `upload_id` path parameter MUST be URL-encoded.
      responses:
        '204':
          description: |
            Upload session aborted on the backend. The file row is
            preserved — call `DELETE /files/{file_id}` to remove the
            file entirely.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/BackendFailure' }

components:

  parameters:
    FileId:
      name: file_id
      in: path
      required: true
      description: Opaque file identifier (UUID) — see ADR-0002.
      schema: { type: string, format: uuid }
    IfMatchOptional:
      name: If-Match
      in: header
      required: false
      description: |
        Optional conditional header. When supplied, the operation
        proceeds only if the row's current etag matches; mismatch
        returns `412`. Strong CAS — for `PUT /files/{file_id}` it
        is also verified against S3's live etag (and version_id on
        versioning-on backends).
      schema: { type: string }
    IfNoneMatch:
      name: If-None-Match
      in: header
      required: false
      description: |
        Conditional read — return `304` when the etag matches.
      schema: { type: string }

  headers:
    RequestId:
      description: Correlation identifier echoed on every response.
      schema: { type: string }
    ETag:
      description: |
        Raw S3 ETag (sans surrounding quotes) for the file's
        current bytes; equal to the `etag` field in `FileInfo`.
      schema: { type: string }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Backend descriptors ──────────────────────────────────────

    Backend:
      type: object
      description: |
        Every FileStorage backend speaks S3 protocol over HTTP and
        respects presigned URLs. The descriptor therefore carries no
        `kind` or `transport` discriminator (each would only ever
        hold one value, by architectural decision). Native non-S3
        transports are out-of-scope.
      required:
        - id
        - default_private
        - default_public
        - capabilities
        - versioning
      properties:
        id:
          type: string
          format: uuid
          description: |
            Stable backend identity, assigned once in the static
            TOML roster. Used in `FileInfo.backend_id` and as the
            optional `backend_id` field on upload requests.
        default_private:
          type: boolean
          description: |
            This backend is the tenant's default for new
            **private** files (presigned downloads only). At least
            one default role per tenant view MUST be set.
        default_public:
          type: boolean
          description: |
            This backend is the tenant's default for new
            **public-read** files. Implies the `public_read_urls`
            capability — every download URL issued for a file
            here is a bare-HTTPS URL with no expiry.
        capabilities:
          type: array
          items:
            type: string
            pattern: '^[a-z][a-z0-9_]+\.[a-z][a-z0-9_]{0,19}$'
            maxLength: 50
          description: |
            Versioned capability tags declared by the backend in the
            TOML roster. Each tag has the shape `<operation>.<version>`
            (regex `^[a-z][a-z0-9_]+\.[a-z][a-z0-9_]{0,19}$`, version
            segment ≤20 chars). The list is validated against the
            SDK's `KNOWN_CAPABILITIES` whitelist at module init;
            unknown tags fail-fast the boot.

            **P1 whitelist (3 tags):**
            - `upload.multipart_v1` — server-mediated multipart upload
              (the only upload path; even single-byte files go
              through it as a one-part session). Handler runs
              `CreateMultipartUpload` and presigns N `UploadPart`
              URLs in one round trip. Companion REST endpoints:
              `POST /files/{file_id}/upload/{upload_id}`
              (commit) and
              `DELETE /files/{file_id}/upload/{upload_id}` (abort
              one session) close out the lifecycle.
            - `download_private.sigv4_v1` — SigV4-signed GET for
              time-limited private downloads.
            - `download_public.v1` — bare-HTTPS public-read URL with
              no signature and no expiry. Pairs with
              `default_public`.
        max_file_size_bytes:
          type: [integer, 'null']
          format: int64
          description: |
            Per-backend hard ceiling on object size in bytes.
            Optional in the TOML roster — when omitted, FileStorage
            falls back to the S3 single-object maximum of **5 TiB**
            (5 * 1024^4 = 5497558138880), per
            https://docs.aws.amazon.com/AmazonS3/latest/userguide/qfacts.html.
            Operators can lower this for tenancy / quota reasons;
            raising it above the S3 hard cap has no effect because
            S3 itself rejects oversize PUTs.
        max_metadata_bytes:
          type: [integer, 'null']
          format: int64
          description: |
            Per-backend hard ceiling on aggregate user-metadata size
            in bytes. Optional — when omitted, FileStorage falls
            back to the S3 user-metadata budget of **2 KiB** (2048),
            per
            https://docs.aws.amazon.com/AmazonS3/latest/userguide/UsingMetadata.html
            ("Within the PUT request header, the user-defined
            metadata is limited to 2 KB in size."). The cap covers
            `Content-Type`, `Content-Disposition` (derived from
            `meta.name`), and every `x-amz-meta-<k>=<v>` mirrored
            entry; `gts_file_type` is DB-only and does NOT count
            toward this budget. Enforced at presign time and at
            `put_file_info`.
        max_presign_ttl_seconds:
          type: [integer, 'null']
          format: int64
          description: |
            Per-backend hard ceiling on presigned-URL TTL in
            seconds. Optional — when omitted, FileStorage falls
            back to the AWS SigV4 maximum of **7 days** (604800),
            per
            https://docs.aws.amazon.com/AmazonS3/latest/API/sigv4-query-string-auth.html
            ("X-Amz-Expires: A maximum of 604800 (seven days).").
            Operators can lower this for tenancy / security reasons;
            raising it above the AWS hard cap has no effect because
            S3 itself rejects signatures requesting longer expiries.
            Applied to every signing path; `download_public.v1` is
            unaffected because public URLs carry no expiry. The
            caller's `UrlParams.expires_in_seconds` is capped by
            this value — exceeding it is a `bad_request`.
        versioning:
          type: boolean
          description: |
            Mirrors the underlying bucket's versioning
            configuration. When `true`, FileStorage tracks the
            S3 VersionId per row and exposes ABA-safe content CAS
            on `PUT /meta` (see ADR-0005). Operator-declared in
            TOML — FileStorage trusts the value and does NOT probe
            `GetBucketVersioning` at boot.

    # ── Owner ────────────────────────────────────────────────────

    OwnerRef:
      type: object
      required: [tenant_id, owner_id]
      description: |
        Owner principal of a file. `owner_id` is the principal's
        UUID (a user or an app — FileStorage does not distinguish;
        the kind is tracked in the identity / authz subsystem).
      properties:
        tenant_id: { type: string, format: uuid }
        owner_id: { type: string, format: uuid }

    # ── File metadata ────────────────────────────────────────────

    CustomMetadata:
      type: object
      additionalProperties: { type: string }

    FileMeta:
      type: object
      required: [name, mime_type, gts_file_type, custom_metadata]
      description: |
        File metadata. Aggregate user-metadata size (Content-Type +
        Content-Disposition + every `x-amz-meta-<k>=<v>`) is capped
        at 2 KB by AWS S3; FileStorage enforces the same cap.
        `gts_file_type` does NOT count toward this budget.
      properties:
        name: { type: string, maxLength: 512 }
        mime_type: { type: string, maxLength: 256 }
        gts_file_type:
          type: string
          maxLength: 256
          description: |
            GTS file type. Mandatory at creation; immutable
            afterwards. Stored in DB only — NEVER mirrored to the
            S3 object.
          readOnly: true
        size_bytes: { type: [integer, 'null'], format: int64, minimum: 0 }
        custom_metadata: { $ref: '#/components/schemas/CustomMetadata' }

    FileMetaUpdate:
      type: object
      description: |
        Mutable subset of `FileMeta`. All fields optional: omitted
        fields keep their current value, fields present replace it.

        Structurally immutable fields are NOT declared here:
        `gts_file_type`, `file_id`, `file_path` (the logical path /
        file key inside the backend's tenant scope), `backend_id`,
        `owner`, `size_bytes`, `etag`, `version_id`, timestamps.
        Any request body that carries `gts_file_type` (or attempts
        to address an immutable identifier through this update
        body) is rejected with `400 bad_request`. **Renaming files
        is not supported** — `file_path` is fixed at upload and
        cannot be changed via any REST or SDK path; to "rename",
        upload a new file at the desired path and delete the old
        one. `name` here is the display label
        (`Content-Disposition`), not an identifier — mutable.
      properties:
        name: { type: string, maxLength: 512 }
        mime_type: { type: string, maxLength: 256 }
        custom_metadata: { $ref: '#/components/schemas/CustomMetadata' }
      additionalProperties: false

    FileStatus:
      type: string
      enum: [pending_upload, completing, uploaded, meta_updating, deleting]
      description: |
        File lifecycle:
        - `pending_upload` — row created by upload presign; bytes
          not confirmed yet.
        - `completing` — Phase 1 of `complete_upload` (initial
          upload or re-upload) flipped the row; Phase 2 invokes
          `CompleteMultipartUpload`; Phase 3 flips back to
          `uploaded` with the finalized etag/version_id. A row
          stuck here is recovered in-band on the next SDK call.
        - `uploaded` — committed by `complete_upload`. The only
          state in which `presign_urls` (download) and `read_file`
          succeed.
        - `meta_updating` — Phase 1 of `PUT /files/{file_id}`
          flipped the row's STATUS only; `name` / `mime_type` /
          `custom_metadata` columns still hold the OLD values.
          Phase 2 issues `CopyObject` self-copy against the
          backend with the merged new metadata. Phase 3 flips
          back to `uploaded` AND writes the new metadata + etag
          atomically. A row stuck here is recovered in-band on
          the next SDK call (HEAD the backend, pull whatever
          metadata is there, run Phase 3).
        - `deleting` — Phase 1 of `delete_file` flipped the row;
          Phase 2 reaps the backend object; Phase 3 purges the
          row. Reads return `not_found`; mutations return
          `delete_in_progress`. Transient operational state, NOT
          a soft-delete tombstone.

    FileInfo:
      type: object
      required:
        - file_id
        - backend_id
        - file_path
        - owner
        - meta
        - status
        - etag
        - version_id
        - size_bytes
        - created_at
        - updated_at
      properties:
        file_id: { type: string, format: uuid }
        backend_id: { type: string, format: uuid }
        file_path: { type: string, maxLength: 1024 }
        owner: { $ref: '#/components/schemas/OwnerRef' }
        meta: { $ref: '#/components/schemas/FileMeta' }
        status: { $ref: '#/components/schemas/FileStatus' }
        etag:
          type: string
          description: |
            Raw S3 ETag for the file's current bytes (sans
            surrounding quotes). Content fingerprint only — does
            not track metadata changes.
        version_id:
          type: [string, 'null']
          description: |
            Raw S3 VersionId for the current generation. `null` on
            backends with `versioning = false`.
        size_bytes: { type: integer, format: int64, minimum: 0 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        upload_expires_at: { type: [string, 'null'], format: date-time }

    FileList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/FileInfo' }
        next_cursor: { type: [string, 'null'] }

    # ── Presign batch (upload + download) ────────────────────────

    UrlParams:
      type: object
      required: [expires_in_seconds]
      properties:
        expires_in_seconds:
          type: integer
          minimum: 1
          maximum: 604800
          description: |
            Requested URL TTL in seconds. Capped server-side by
            the backend's configured maximum. Ignored for
            public-read URL outcomes.
        content_disposition: { type: [string, 'null'] }
        content_type_override: { type: [string, 'null'] }
        allowed_client_cidrs:
          type: array
          items: { type: string }

    PresignBatchRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items: { $ref: '#/components/schemas/PresignItem' }

    PresignItem:
      oneOf:
        - $ref: '#/components/schemas/PresignUploadItem'
        - $ref: '#/components/schemas/PresignDownloadItem'
      discriminator:
        propertyName: kind
        mapping:
          upload: '#/components/schemas/PresignUploadItem'
          download: '#/components/schemas/PresignDownloadItem'

    PresignUploadItem:
      type: object
      required: [kind, capability, part_count, params]
      description: |
        Upload presign item. The single canonical upload path is
        multipart (`capability = "upload.multipart_v1"`); single-byte
        files go through it as a one-part session. Two modes
        discriminated by presence of `file_id`:

        - **`file_id` absent — initial upload.** Server mints a
          fresh `file_id`, INSERTs a row in `pending_upload`,
          starts a multipart session. `owner`, `file_path`, `meta`
          required; `backend_id` is optional and falls back to
          `default_private`.
        - **`file_id` present — re-upload (overwrite in place).**
          The row MUST exist and be in `Uploaded`. Server pins the
          row's CURRENT metadata into the part URLs and starts a
          fresh multipart session against the same backend object
          key. `owner`, `file_path`, `meta`, `backend_id` are
          ignored.

        Server validates `capability` against the resolved backend's
        declared `capabilities` list — unknown / undeclared tag →
        per-item `capability_unavailable`.
      properties:
        kind: { type: string, enum: [upload] }
        capability:
          type: string
          pattern: '^[a-z][a-z0-9_]+\.[a-z][a-z0-9_]{0,19}$'
          maxLength: 50
          description: |
            Versioned signing tag. The only valid value is
            `"upload.multipart_v1"`.
        part_count:
          type: integer
          minimum: 1
          maximum: 10000
          description: |
            Number of parts to presign in this multipart session
            (1..=10000 per S3's hard cap). The caller is
            responsible for choosing a part size consistent with
            the backend's minimum (5 MiB on AWS S3 except the final
            part — single-part uploads use one part as the final
            part, which has no minimum size). FileStorage does not
            pick `part_size` and does not retroactively extend a
            session — if the file turns out larger than `part_count`
            covers, the caller aborts and re-inits.
        file_id:
          type: [string, 'null']
          format: uuid
          description: |
            When present, switches this item into re-upload mode
            (overwrite the existing row's bytes in place; metadata
            is preserved from the row).
        backend_id:
          type: [string, 'null']
          format: uuid
          description: |
            Optional on initial upload — when omitted (or `null`),
            the server falls back to the caller's tenant
            `default_private` backend. Ignored on re-upload.
        owner:
          oneOf:
            - $ref: '#/components/schemas/OwnerRef'
            - type: 'null'
          description: |
            Required on initial upload, ignored on re-upload.
        file_path:
          type: [string, 'null']
          maxLength: 1024
          description: |
            Required on initial upload, ignored on re-upload.
        meta:
          oneOf:
            - $ref: '#/components/schemas/FileMeta'
            - type: 'null'
          description: |
            Required on initial upload. **Forbidden** on re-upload
            — the server uses the row's current metadata.
        params: { $ref: '#/components/schemas/UrlParams' }

    PresignDownloadItem:
      type: object
      required: [kind, file_id, capability, params]
      properties:
        kind: { type: string, enum: [download] }
        capability:
          type: string
          pattern: '^[a-z][a-z0-9_]+\.[a-z][a-z0-9_]{0,19}$'
          maxLength: 50
          description: |
            Versioned signing tag. P1: `download_private.sigv4_v1`
            (SigV4-signed, time-limited) or `download_public.v1`
            (bare-HTTPS, no expiry). Server validates against the
            target backend's declared `capabilities`; mismatch →
            per-item `capability_unavailable`.
        file_id: { type: string, format: uuid }
        params: { $ref: '#/components/schemas/UrlParams' }
        etag:
          type: [string, 'null']
          description: |
            Optional but strongly recommended. When present the
            server verifies the row's current `etag` matches
            (DB-only check; no HEAD against S3) before signing; on
            mismatch the per-item outcome is `etag_mismatch`.
        version_id:
          type: [string, 'null']
          description: |
            Historical version selector. Honoured only when the
            file's hosting backend has `versioning = true`; the
            signed URL embeds `versionId=<vid>` so the caller
            fetches that exact generation. Ignored on
            non-versioning backends.

    PresignBatchResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PresignOutcome' }

    PresignOutcome:
      type: object
      required: [kind]
      description: |
        Per-item outcome. Either `ok` is set (with the
        capability-specific result) or `error` is set (RFC 7807
        problem details).
      properties:
        kind: { type: string, enum: [upload, download] }
        ok:
          oneOf:
            - $ref: '#/components/schemas/PresignedUploadHandle'
            - $ref: '#/components/schemas/PresignedDownload'
            - type: 'null'
        error:
          oneOf:
            - $ref: '#/components/schemas/ProblemDetails'
            - type: 'null'

    PresignedUploadHandle:
      type: object
      required: [file_id, upload_id, part_urls, expires_at]
      description: |
        Outcome of a presign-batch item with
        `capability = "upload.multipart_v1"` — the only upload
        presign path. The server has already executed
        `CreateMultipartUpload` against the backend; `upload_id`
        is **not** persisted by FileStorage — the caller MUST keep
        it for the subsequent commit
        (`POST /files/{file_id}/upload/{upload_id}`) or
        abort (`DELETE /files/{file_id}/upload/{upload_id}`).
        `complete` runs `CompleteMultipartUpload` itself and flips
        the row through `Completing → Uploaded` in one
        transaction; there is no separate reconcile primitive.
      properties:
        file_id: { type: string, format: uuid }
        upload_id:
          type: string
          description: |
            Backend-supplied multipart session id (e.g. S3
            `UploadId`). Opaque, may contain base64 special
            characters — clients MUST URL-encode when embedding
            in path parameters.
        part_urls:
          type: array
          items:
            type: object
            required: [part_number, url]
            properties:
              part_number: { type: integer, minimum: 1, maximum: 10000 }
              url: { type: string, format: uri }
        expires_at:
          type: string
          format: date-time
          description: |
            Common expiry across every part URL (uniform TTL
            from `UrlParams.expires_in_seconds`).

    UploadCompleteRequest:
      type: object
      required: [parts]
      description: |
        Body for `POST /files/{file_id}/upload/{upload_id}`.
        Mirrors the `CompletedMultipartUpload` payload S3 expects.
      properties:
        parts:
          type: array
          minItems: 1
          maxItems: 10000
          items:
            type: object
            required: [part_number, etag]
            properties:
              part_number: { type: integer, minimum: 1, maximum: 10000 }
              etag:
                type: string
                description: |
                  Whatever the backend returned in the `ETag`
                  response header of the corresponding `UploadPart`
                  call. Opaque to FileStorage; passed straight to
                  `CompleteMultipartUpload`.

    PresignedDownload:
      type: object
      required: [url, expires_at, is_public]
      properties:
        url: { type: string, format: uri }
        expires_at:
          type: string
          format: date-time
          description: |
            URL expiry. For public-read backends
            (`is_public = true`), set to a far-future sentinel
            ("never expires").
        is_public:
          type: boolean
          description: |
            `true` when the URL is a bare-HTTPS public-read URL
            (no signing, no expiry). `false` for SigV4 GET URLs.

    # ── Errors ──────────────────────────────────────────────────

    ProblemDetails:
      type: object
      required: [type, title, status, code]
      description: RFC 7807 Problem Details with FileStorage extensions.
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code:
          type: string
          description: |
            Stable error code. Values: `not_found`,
            `access_denied`, `bad_request`, `etag_mismatch`,
            `delete_in_progress`, `invalid_status_transition`,
            `capability_unavailable`, `payload_too_large`,
            `upload_expired`, `backend_failure`, `conflict`,
            `internal`.
        correlation_id:
          type: string
          description: Mirrors `X-Request-Id`.
        max_metadata_bytes:
          type: [integer, 'null']
          description: |
            Present only on `payload_too_large` errors caused by
            the user-metadata budget. Reports the backend's effective
            cap — usually `2048` (the S3 default) but may be lower
            when the operator configured `Backend.max_metadata_bytes`
            below the S3 ceiling.

  responses:
    BadRequest:
      description: Request validation failed.
      headers:
        X-Request-Id: { $ref: '#/components/headers/RequestId' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Unauthorized:
      description: Missing or invalid bearer token.
      headers:
        X-Request-Id: { $ref: '#/components/headers/RequestId' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Forbidden:
      description: Authorization denied.
      headers:
        X-Request-Id: { $ref: '#/components/headers/RequestId' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    NotFound:
      description: |
        File or backend not found. Returned identically for "absent"
        and "not visible to this tenant" — see ADR-0002.
      headers:
        X-Request-Id: { $ref: '#/components/headers/RequestId' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    EtagMismatch:
      description: |
        The `If-Match` etag did not match the row's current etag
        (or, for `PUT /meta` with strong CAS, S3's live etag /
        version_id).
      headers:
        ETag: { $ref: '#/components/headers/ETag' }
        X-Request-Id: { $ref: '#/components/headers/RequestId' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    InternalError:
      description: Unexpected server error.
      headers:
        X-Request-Id: { $ref: '#/components/headers/RequestId' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Conflict:
      description: |
        Conflicting state. Possible `code` values: `conflict`
        (optimistic concurrency retries exhausted, or row already
        in a terminal state — e.g. multipart `complete` against an
        already-`Uploaded` row), `delete_in_progress` (row in
        `Deleting`).
      headers:
        X-Request-Id: { $ref: '#/components/headers/RequestId' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    BackendFailure:
      description: |
        Wrapped error from the storage backend (S3 5xx, network,
        signature rejection, etc.). The `code` is `backend_failure`.
      headers:
        X-Request-Id: { $ref: '#/components/headers/RequestId' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
